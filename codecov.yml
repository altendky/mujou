coverage:
  status:
    project:
      default:
        threshold: 2%  # Ratchet - fail if coverage drops more than 2%
    patch:
      default:
        target: 100%  # New code must be fully covered

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: true

flags:
  rust:
    paths:
      - crates/
    carryforward: true

component_management:
  individual_components:
    - component_id: rust
      name: Rust
      paths:
        - crates/**
